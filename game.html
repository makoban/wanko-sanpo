<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>わんこさんぽ 🐕</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐕</text></svg>">
<style>
  :root{
    --pink:#ff8fae; --cream:#fff8ef;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:18px 12px 30px;
    font-family:'Hiragino Maru Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:
      radial-gradient(circle at 12% 20%, rgba(255,255,255,.55) 0 6px, transparent 7px),
      radial-gradient(circle at 78% 60%, rgba(255,255,255,.5) 0 5px, transparent 6px),
      radial-gradient(circle at 40% 85%, rgba(255,255,255,.5) 0 4px, transparent 5px),
      linear-gradient(160deg,#ffe9f2 0%, #fff6de 45%, #e2f6ff 100%);
    background-attachment: fixed;
  }
  h1{
    font-size:clamp(26px,5vw,40px);
    color:#7a4a2f;
    letter-spacing:.12em;
    text-shadow:0 3px 0 #fff, 0 5px 0 rgba(255,143,174,.35);
    margin-bottom:2px;
  }
  .sub{
    color:#b0765a; font-size:14px; margin-bottom:14px; letter-spacing:.15em;
  }
  #frame{
    position:relative;
    width:min(92vw, 900px);
    border-radius:22px;
    padding:10px;
    background:linear-gradient(#ffd3e2,#ffc2d6);
    box-shadow:0 10px 0 rgba(214,120,150,.45), 0 22px 40px rgba(160,90,120,.25);
  }
  #frame::before{
    content:"🐾"; position:absolute; top:-14px; left:24px; font-size:26px;
    transform:rotate(-16deg);
  }
  #frame::after{
    content:"🌼"; position:absolute; top:-14px; right:24px; font-size:26px;
    transform:rotate(14deg);
  }
  #stage{
    position:relative; width:100%; border-radius:14px; overflow:hidden; background:#8ecf6f;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  canvas#game{
    display:block; width:100%;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  canvas#ui{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }
  #mute, #book{
    position:absolute; right:18px; z-index:5;
    border:none; cursor:pointer;
    width:44px; height:44px; border-radius:50%;
    font-size:20px; background:rgba(255,255,255,.9);
    box-shadow:0 3px 0 rgba(180,110,140,.5);
    transition:transform .1s;
  }
  #mute{ top:18px; }
  #book{ top:70px; }
  #mute:active, #book:active{ transform:scale(.9); }
  #stickBase, #stickKnob{
    position:absolute; border-radius:50%; pointer-events:none; display:none; z-index:6;
    transform:translate(-50%,-50%);
  }
  #stickBase{
    width:84px; height:84px;
    background:rgba(255,255,255,.22); border:2px solid rgba(255,255,255,.65);
  }
  #stickKnob{
    width:38px; height:38px;
    background:rgba(255,255,255,.88); box-shadow:0 2px 8px rgba(120,70,90,.35);
  }
  #act{
    position:absolute; right:16px; bottom:16px; z-index:5;
    width:64px; height:64px; border-radius:50%; border:none;
    background:rgba(255,255,255,.88); font-size:30px;
    box-shadow:0 4px 0 rgba(180,110,140,.5);
    display:none; align-items:center; justify-content:center;
  }
  #act:active{ transform:scale(.92); }
  #ballBtn{
    position:absolute; right:16px; bottom:92px; z-index:5;
    width:52px; height:52px; border-radius:50%; border:none;
    background:rgba(255,255,255,.88); font-size:24px;
    box-shadow:0 4px 0 rgba(180,110,140,.5);
    display:none; align-items:center; justify-content:center;
  }
  #ballBtn:active{ transform:scale(.92); }
  body.hasball #ballBtn{ display:flex; }
  /* おみせ・ずかん パネル */
  .panel{
    position:absolute; inset:6% 5%; z-index:20;
    background:rgba(255,250,240,.97);
    border:3px solid #ffb0c8; border-radius:18px;
    padding:14px 16px; overflow-y:auto;
    color:#6b4a38; font-size:14px; display:none;
    box-shadow:0 10px 30px rgba(120,60,90,.35);
  }
  .panel h2{ font-size:17px; color:#c05577; margin:2px 0 8px; letter-spacing:.08em; }
  .panel h3{ font-size:14px; color:#8a5f47; margin:12px 0 4px; }
  .panel .row{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:6px 2px; border-bottom:1px dashed #ecd9c4;
  }
  .panel .row .nm{ flex:1; }
  .panel .muted{ color:#bfa893; }
  .panel button{
    border:none; border-radius:999px; padding:5px 14px; cursor:pointer;
    font-weight:bold; font-family:inherit; font-size:13px;
    background:#ff8fae; color:#fff; box-shadow:0 2px 0 rgba(190,90,120,.5);
  }
  .panel button:disabled{ background:#e3d5c6; box-shadow:none; }
  .panel .close{
    position:sticky; float:right; top:0;
    background:#fff; color:#c05577; border:2px solid #ffb0c8;
    width:32px; height:32px; padding:0; border-radius:50%;
  }
  .panel .bells{ font-weight:bold; color:#c98b1e; }
  .hint-sp{ display:none; }
  @media (pointer:coarse){
    #act{ display:flex; }
    .hint-pc{ display:none; }
    .hint-sp{ display:block; }
  }
  body.touch #act{ display:flex; }
  body.touch .hint-sp{ display:block; }
  body.touch .hint-pc{ display:none; }
  @media (max-width:700px){
    body{ padding:8px 6px 16px; }
    h1{ font-size:22px; letter-spacing:.06em; }
    .sub{ font-size:11px; margin-bottom:8px; letter-spacing:.08em; }
    #frame{ padding:6px; border-radius:16px; width:min(96vw, 480px); }
    #frame::before, #frame::after{ font-size:18px; top:-10px; }
    #mute, #book{ width:38px; height:38px; font-size:16px; right:12px; }
    #mute{ top:12px; } #book{ top:56px; }
    #act{ width:56px; height:56px; font-size:26px; right:12px; bottom:12px; }
    .hint{ font-size:11px; padding:7px 12px; margin-top:8px; line-height:1.7; }
    .panel{ font-size:13px; inset:4% 3%; }
  }
  .hint{
    margin-top:16px; color:#8a5f47; font-size:14px;
    background:rgba(255,255,255,.7);
    padding:10px 20px; border-radius:999px;
    box-shadow:0 3px 0 rgba(200,150,120,.25);
    text-align:center; line-height:1.9;
  }
  .hint b{ color:#e0648d; }

<body>
<h1>🐕 わんこさんぽ 🌸</h1>
<p class="sub">〜 いぬと いっしょに のんびり おさんぽ 〜</p>

<div id="frame">
  <div id="stage">
    <canvas id="game" width="320" height="240"></canvas>
    <canvas id="ui"></canvas>
    <button id="mute" title="おんがく">🔇</button>
    <button id="book" title="ずかん">📖</button>
    <div id="stickBase"></div>
    <div id="stickKnob"></div>
    <button id="act" title="アクション">🐾</button>
    <button id="ballBtn" title="ボールをなげる">🎾</button>
    <div id="shopPanel" class="panel"></div>
    <div id="bookPanel" class="panel"></div>
  </div>
</div>

<p class="hint hint-pc">
  🎮 <b>やじるしキー / WASD</b>：あるく　　🖐 <b>スペース</b>：はなす ・ なでる ・ きをゆらす ・ つる ・ とる ・ ほる　　🎾 <b>Z</b>：ボール　　📖 <b>B</b>：ずかん
</p>
<p class="hint hint-sp">
  📱 <b>ゆびで ドラッグ</b>：あるく　　🐾 <b>タップ</b>：はなす ・ なでる ・ とる ・ ほる　　🎾ボタン：ボール
</p>

<script>
"use strict";
/* ================= 基本セットアップ ================= */
const T = 24, MW = 40, MH = 64;      /* おおきな縦長の街（48pxキャラに合わせ1.5倍スケール） */
let VW = 320, VH = 240;
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
ctx.imageSmoothingEnabled = false;
const ui = document.getElementById("ui");
const uictx = ui.getContext("2d");

function fitUI(){
  const r = cvs.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  ui.width  = Math.round(r.width  * dpr);
  ui.height = Math.round(r.height * dpr);
}
function applyViewport(){
  const portrait = window.innerHeight > window.innerWidth && window.innerWidth < 820;
  const nVW = portrait ? 336 : 480, nVH = portrait ? 504 : 360;
  if(nVW !== VW || nVH !== VH){
    VW = nVW; VH = nVH;
    cvs.width = VW; cvs.height = VH;
    ctx.imageSmoothingEnabled = false;
  }
  fitUI();
}
window.addEventListener("resize", applyViewport);

/* ================= 入力 ================= */
const keys = {};
let actPressed = false;
window.addEventListener("keydown", e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","Spacebar"].includes(e.key)) e.preventDefault();
  if((e.key===" "||e.key==="Spacebar") && !keys[" "]) actPressed = true;
  if(e.key==="b" || e.key==="B") toggleBook();
  if((e.key==="z" || e.key==="Z") && hasBall && ball.state==="none" && !dialog && !fishing) throwBall();
  if(e.key==="Escape") closePanels();
  keys[e.key] = true;
  if(e.key.length===1) keys[e.key.toLowerCase()] = true;
  initAudio();
});
window.addEventListener("keyup", e=>{
  keys[e.key] = false;
  if(e.key.length===1) keys[e.key.toLowerCase()] = false;
});
document.addEventListener("pointerdown", initAudio);

/* --- タッチ操作（スマホ）：ドラッグ＝スティック / タップ＝アクション --- */
const stage = document.getElementById("stage");
const stickBase = document.getElementById("stickBase");
const stickKnob = document.getElementById("stickKnob");
const actBtn = document.getElementById("act");
const ballBtn2 = document.getElementById("ballBtn");
ballBtn2.addEventListener("click", ()=>{
  if(hasBall && ball.state==="none" && !dialog && !fishing) throwBall();
});
let touchId = null, touchOrigin = null, touchMoved = false, touchT0 = 0;
const touchVec = {x:0, y:0};
function stagePos(t){
  const r = stage.getBoundingClientRect();
  return [t.clientX - r.left, t.clientY - r.top];
}
function placeStick(bx,by,kx,ky){
  stickBase.style.left = bx+"px"; stickBase.style.top = by+"px";
  stickKnob.style.left = kx+"px"; stickKnob.style.top = ky+"px";
}
stage.addEventListener("touchstart", e=>{
  if(e.target.closest(".panel") || e.target===muteBtn || e.target===bookBtn || e.target===ballBtn2) return;
  document.body.classList.add("touch");
  initAudio();
  for(const t of e.changedTouches){
    if(t.target === actBtn){ actPressed = true; continue; }
    if(touchId === null){
      touchId = t.identifier;
      touchMoved = false; touchT0 = performance.now();
      const [x,y] = stagePos(t);
      touchOrigin = [x,y];
      stickBase.style.display = stickKnob.style.display = "block";
      placeStick(x,y,x,y);
    }else{
      actPressed = true;
    }
  }
  e.preventDefault();
}, {passive:false});
stage.addEventListener("touchmove", e=>{
  for(const t of e.changedTouches){
    if(t.identifier !== touchId) continue;
    const [x,y] = stagePos(t);
    const dx = x-touchOrigin[0], dy = y-touchOrigin[1];
    const len = Math.hypot(dx,dy);
    if(len > 12) touchMoved = true;
    if(len < 10){
      touchVec.x = 0; touchVec.y = 0;
      placeStick(touchOrigin[0], touchOrigin[1], x, y);
      continue;
    }
    const ux = dx/len, uy = dy/len;
    touchVec.x = ux; touchVec.y = uy;
    const cl = Math.min(len, 42);
    placeStick(touchOrigin[0], touchOrigin[1], touchOrigin[0]+ux*cl, touchOrigin[1]+uy*cl);
  }
  e.preventDefault();
}, {passive:false});
function touchEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier !== touchId) continue;
    if(!touchMoved && performance.now()-touchT0 < 300) actPressed = true;
    touchId = null; touchVec.x = 0; touchVec.y = 0;
    stickBase.style.display = stickKnob.style.display = "none";
  }
  e.preventDefault();
}
stage.addEventListener("touchend", touchEnd, {passive:false});
stage.addEventListener("touchcancel", touchEnd, {passive:false});

/* ================= ユーティリティ ================= */
function h32(x,y){
  let n = (x*374761393 + y*668265263) | 0;
  n = ((n ^ (n>>>13)) * 1274126177) | 0;
  return ((n ^ (n>>>16)) >>> 0);
}
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const dist = (ax,ay,bx,by)=>Math.hypot(ax-bx, ay-by);

/* ================= ドット絵スプライト（フォールバック用） ================= */
const PAL = {
  K:"#4a3228", H:"#a06a45", S:"#ffdcc2", E:"#33241f",
  P:"#ff8fae", D:"#e86e97", W:"#ffffff", R:"#c9575c", o:"#ffb3c0",
  O:"#e8a45e", C:"#fff3e0", N:"#3a2a24",
  G:"#9aa0b4", B:"#6db4e8", Y:"#f5d259", n:"#f08a9b"
};
function spr(rows, extra){
  const pal = extra ? Object.assign({}, PAL, extra) : PAL;
  const w = rows[0].length, h = rows.length;
  for(const r of rows) if(r.length !== w) console.warn("sprite width mismatch:", r);
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const g = c.getContext("2d");
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const ch = rows[y][x];
    if(ch === ".") continue;
    g.fillStyle = pal[ch] || "#f0f";
    g.fillRect(x,y,1,1);
  }
  return c;
}
function flip(c){
  const f = document.createElement("canvas");
  f.width = c.width; f.height = c.height;
  const g = f.getContext("2d");
  g.translate(c.width,0); g.scale(-1,1);
  g.drawImage(c,0,0);
  return f;
}
const GIRL_DOWN_A = spr([

const GIRL_UP_A = spr([
"...KKKKKK...","..KHHHHHHK..",".KHHHHHHHHK.",".KHHWWHHHHK.",".KHHWWHHHHK.",
".KHHHHHHHHK.",".KHHHHHHHHK.","..KHHHHHHK..","...KPPPPK...","..KPPPPPPK..",
".KSPPPPPPSK.",".KSPPPPPPSK.","..KPPPPPPK..","..KDDDDDDK..","...SS..SS...","...RR..RR..."]);
const GIRL_UP_B = spr([
"...KKKKKK...","..KHHHHHHK..",".KHHHHHHHHK.",".KHHWWHHHHK.",".KHHWWHHHHK.",
".KHHHHHHHHK.",".KHHHHHHHHK.","..KHHHHHHK..","...KPPPPK...","..KPPPPPPK..",
".KSPPPPPPSK.",".KSPPPPPPSK.","..KPPPPPPK..","..KDDDDDDK..","..SS....SS..","..RR....RR.."]);
const GIRL_R_A = spr([
"...KKKKKK...","..KHHHHHHK..",".KHHHHHHHHK.",".KHHHHHHHHK.",".KHHHSSSSK..",
".KHHHSSESK..",".KHHHSSSSK..","..KHHSooSK..","...KPPPPK...","..KPPPPPPK..",
"..KPPSSPPK..","..KPPSSPPK..","..KPPPPPPK..","..KDDDDDDK..","....SS.SS...","....RR.RR..."]);
const GIRL_R_B = spr([
"...KKKKKK...","..KHHHHHHK..",".KHHHHHHHHK.",".KHHHHHHHHK.",".KHHHSSSSK..",
".KHHHSSESK..",".KHHHSSSSK..","..KHHSooSK..","...KPPPPK...","..KPPPPPPK..",
"..KPPSSPPK..","..KPPSSPPK..","..KPPPPPPK..","..KDDDDDDK..","...SS...SS..","...RR...RR.."]);
const GIRL = {

  up:  [GIRL_UP_A, GIRL_UP_B],
  right:[GIRL_R_A, GIRL_R_B],

const DOG_R_A = spr([
"..........KK.KK.","..........KOKKOK","..........KOOOOK",".........KOOOOOK",

".KOOCCCCCCOOOK..",".KOOKOOOOOKOOK..","..KOK....KOK....","..KK......KK...."]);
const DOG_R_B = spr([
"..........KK.KK.","..........KOKKOK","..........KOOOOK",".........KOOOOOK",
"...KKKKKKOOOEOOK","..KOOOOOOOOOOCCK","..KOOOOOOOOCCNK.",".KOOOCCCCCOOOK..",
".KOOCCCCCCOOOK..",".KOOKOOOOOKOOK..",".KOK......KOK...",".KK........KK..."]);
const DOG = {
  right:[DOG_R_A, DOG_R_B],
  left:[flip(DOG_R_A), flip(DOG_R_B)]
};
const BIRD = spr([
"..KKKK..",".KBBBBK.","nKBEBBBK",".KBBWBBK",".KBBBBK.","..KKKK..","...K.K.."]);
const DUCK = spr([
"...KKK......","..KYYYK.....","nnKYEYK.....","..KYYYK.....","..KYYYYKKK..",
".KYYYYYYYYK.",".KYYWWYYYYK.","..KYYYYYYK..","...KKKKKK..."]);

/* 住民フォールバック（頭＋からだ合成） */
const BODY_A = [

const BODY_B = [

function makeVillager(head, pal){
  return [ spr(head.concat(BODY_A), pal), spr(head.concat(BODY_B), pal) ];
}

/* --- PNGスプライトシート読み込み --- */
const SPR = {};
function sliceSheet(img, facesLeft){
  const cell = img.width/3;
  const off = document.createElement("canvas");
  off.width = img.width; off.height = img.height;
  const g = off.getContext("2d");
  g.drawImage(img,0,0);
  let data = null;
  try{ data = g.getImageData(0,0,img.width,img.height).data; }catch(e){}
  const rows = [];
  for(let r=0;r<3;r++){
    const row = [];
    for(let c=0;c<3;c++){
      let x0=0, y0=0, x1=cell-1, y1=cell-1;
      if(data){
        x0=cell; y0=cell; x1=-1; y1=-1;
        for(let y=0;y<cell;y++) for(let x=0;x<cell;x++){
          const a = data[(((r*cell+y)*img.width)+(c*cell+x))*4+3];
          if(a>=128){
            if(x<x0)x0=x; if(x>x1)x1=x;
            if(y<y0)y0=y; if(y>y1)y1=y;
          }
        }
        if(x1<0){ x0=0;y0=0;x1=cell-1;y1=cell-1; }
      }
      const w=x1-x0+1, h=y1-y0+1;
      const cv = document.createElement("canvas");
      cv.width=w; cv.height=h;
      const cg = cv.getContext("2d");
      cg.imageSmoothingEnabled = false;
      cg.drawImage(img, c*cell+x0, r*cell+y0, w,h, 0,0, w,h);
      row.push({c:cv, w, h});
    }
    rows.push(row);
  }
  const raw = rows[2];
  const flipped = rows[2].map(f=>({c:flip(f.c), w:f.w, h:f.h}));
  return {
    down: rows[0], up: rows[1],
    side:  facesLeft ? raw : flipped,
    sideR: facesLeft ? flipped : raw
  };
}

function manageBugs(night){
  const want = night
    ? ["ホタル","ホタル","ホタル","ホタル"]
    : ["モンシロチョウ","モンキチョウ","ピンクの ちょうちょ","ミツバチ","とんぼ","モンシロチョウ"];
  /* 時間帯に あわない むしは かえる */
  for(let i=bugs.length-1;i>=0;i--){
    const isN = bugs[i].kind==="hotaru";
    if(isN !== night) bugs.splice(i,1);
  }
  const counts = {};
  for(const b of bugs) counts[b.name]=(counts[b.name]||0)+1;
  for(const w of want){
    const have = counts[w]||0;
    const need = want.filter(x=>x===w).length;
    if(have < need){ spawnBug(w); counts[w]=(counts[w]||0)+1; }
  }
}

let ac = null, master = null, delayN = null, muted = true;

const muteBtn = document.getElementById("mute");

function initAudio(){
  if(ac) return;
  try{
    ac = new (window.AudioContext||window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = 0;
    delayN = ac.createDelay(1); delayN.delayTime.value = 0.28;
    const fb = ac.createGain(); fb.gain.value = 0.3;
    const wet = ac.createGain(); wet.gain.value = 0.25;
    delayN.connect(fb); fb.connect(delayN);
    delayN.connect(wet); wet.connect(master);
    master.connect(ac.destination);
    nextNote = ac.currentTime + 0.3;
  }catch(e){}
}
muteBtn.addEventListener("click", ()=>{
  initAudio();
  muted = !muted;
  muteBtn.textContent = muted ? "🔇" : "🎵";
  if(master) master.gain.linearRampToValueAtTime(muted?0:0.16, ac.currentTime+0.3);
  if(ac && ac.state==="suspended") ac.resume();
});
function playNote(midi, t){
  const f = 440*Math.pow(2,(midi-69)/12);
  const o = ac.createOscillator(); o.type = "triangle"; o.frequency.value = f;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.5,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
  o.connect(g); g.connect(master); g.connect(delayN);
  o.start(t); o.stop(t+0.6);
}
function tickMusic(){
  if(!ac || muted) return;
  while(nextNote < ac.currentTime + 0.25){
    playNote(MELODY[noteI % MELODY.length], nextNote);
    if(noteI % 4 === 0) playNote(MELODY[noteI % MELODY.length]-24, nextNote);
    noteI++; nextNote += 0.34;
  }
}
function sfx(type, freq, dur, vol, slideTo){
  if(!ac) return;
  if(ac.state==="suspended") ac.resume();
  const t0 = ac.currentTime;
  const o = ac.createOscillator(); o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0+dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}

const QUEST_TYPES = [
  {type:"apple", n:3, reward:400, ask:n=>`りんごを ${n}こ もってきて くれない？`},
  {type:"fish",  n:1, reward:500, ask:n=>`おさかなが たべたいなあ… ${n}ぴき つってきて！`},
  {type:"bug",   n:1, reward:450, ask:n=>`むしが だいすき！ ${n}ぴき つかまえてきて〜`}
];
function activeQuests(){ return VILLAGERS.filter(v=>v.quest).length; }
function tryAssignQuest(){
  if(activeQuests() >= 3) return;
  const free = VILLAGERS.filter(v=>!v.quest);
  if(!free.length) return;
  const v = free[Math.floor(Math.random()*free.length)];
  const q = QUEST_TYPES[Math.floor(Math.random()*QUEST_TYPES.length)];
  v.quest = { type:q.type, n:q.n, reward:q.reward, ask:q.ask(q.n) };
}
function questHave(q){
  if(q.type==="apple") return pocket.apple >= q.n;
  if(q.type==="fish")  return sumInv(fishInv) >= q.n;
  if(q.type==="bug")   return sumInv(bugInv) >= q.n;
  return false;
}
function questConsume(q){
  if(q.type==="apple"){ pocket.apple -= q.n; return; }
  const inv = q.type==="fish" ? fishInv : bugInv;
  const defs = q.type==="fish" ? FISH_DEFS : BUG_DEFS;
  let left = q.n;
  /* やすいものから わたす（レアは のこす） */
  const sorted = Object.keys(inv).filter(k=>inv[k]>0)
    .sort((a,b)=>(defs.find(d=>d.name===a)?.price||0)-(defs.find(d=>d.name===b)?.price||0));
  for(const k of sorted){
    while(left>0 && inv[k]>0){ inv[k]--; left--; }
    if(left<=0) break;
  }
}

/* ================= アクション ================= */
function dirVec(){
  return player.dir==="left"?[-1,0]:player.dir==="right"?[1,0]:player.dir==="up"?[0,-1]:[0,1];
}
function startDialog(v){
  let text;
  if(v.quest && questHave(v.quest)){
    questConsume(v.quest);
    bells += v.quest.reward;
    v.love = Math.min(5, v.love+1);
    text = `わあ！ ありがとう！！ おれいに ${v.quest.reward}ベル どうぞ♪`;
    v.quest = null;
    coinSfx();
    for(let i=0;i<3;i++) hearts.push({x:v.x+(Math.random()*20-10), y:v.y-24-i*4, vy:-(21+Math.random()*12), life:1.3});
    markSave();
  }else if(v.quest){
    text = v.quest.ask;
  }else{
    text = v.lines[v.lineI % v.lines.length];
    v.lineI++;
    if(time - v.lastTalk > 30){ v.love = Math.min(5, v.love + 0.34); v.lastTalk = time; markSave(); }
  }
  dialog = { v, text, chars:0 };
  v.state = "idle"; v.wt = 2.5;
}
function startFishing(bx,by){
  fishing = { bx, by, t:0, biteT:1.5+Math.random()*2.8, state:"wait", hookT:0 };
  splash();
}
function endFishing(msg){
  if(msg) floatTexts.push({x:player.x, y:player.y-18, text:msg, t:1.6});
  fishing = null;
}
function pickWeightedFish(){
  let sum = 0; for(const f of FISH_DEFS) sum += f.w;
  let r = Math.random()*sum;
  for(const f of FISH_DEFS){ r -= f.w; if(r<=0) return f; }
  return FISH_DEFS[0];
}
function throwBall(){
  const [dx,dy] = dirVec();
  ball.state = "fly";
  ball.x = player.x + dx*9; ball.y = player.y - 6 + dy*9;
  ball.vx = dx*158; ball.vy = dy*158;
  ball.z = 12; ball.vz = 63;
  sfx("triangle", 500, 0.12, 0.07, 900);
  floatTexts.push({x:player.x, y:player.y-20, text:"それっ！🎾", t:1});
}
function digAt(spot){
  thud();
  for(let i=0;i<6;i++){
    puffs.push({x:spot.tx*T+12+(Math.random()*16-8), y:spot.ty*T+12, life:0.7, r:2, dirt:true});
  }
  const r = Math.random();
  let msg;
  if(r < 0.5){ const b = 30+Math.floor(Math.random()*90); bells += b; msg = `🔔 ${b}ベル みつけた！`; coinSfx(); }
  else if(r < 0.8){ const b = 150+Math.floor(Math.random()*250); bells += b; msg = `🔔 ${b}ベル ほりあてた！`; coinSfx(); }
  else if(r < 0.93){ pocket.fossil++; msg = "🦴 かせきを ほりあてた！"; jingle(); }
  else { bells += 2000; msg = "✨ きんの ホネ！！ 2000ベル！"; jingle(); }
  popup = { text: msg, t:2.4 };
  digSpots.splice(digSpots.indexOf(spot),1);
  digRespawnT = 8+Math.random()*10;
  markSave();
}
function tryAction(){
  if(dialog){
    if(dialog.chars < dialog.text.length){ dialog.chars = dialog.text.length; }
    else dialog = null;
    return;
  }
  if(fishing){
    if(fishing.state === "wait"){ endFishing("…なにも いないみたい"); }
    else{
      const f = pickWeightedFish();
      fishInv[f.name] = (fishInv[f.name]||0)+1;
      const isNew = !caughtFish.has(f.name);
      caughtFish.add(f.name);
      popup = { text: (f.name==="ながぐつ" ? "👢 ながぐつを つりあげた！ …なんで？"
                                          : `🐟 ${f.name}を つりあげた！`) + (isNew?"　✨ずかんに のった！":""), t:2.6 };
      jingle();
      fishing = null;
      markSave();
    }
    return;
  }
  const cands = [];
  /* 住民 */
  for(const v of VILLAGERS){
    const d = dist(player.x,player.y, v.x,v.y);
    if(d < 39) cands.push({d:d*0.8, f:()=>startDialog(v)});
  }
  /* おみせ */
  {
    const d = dist(player.x,player.y, STALL.tx*T+24, STALL.ty*T+30);
    if(d < 51) cands.push({d:d*0.85, f:openShop});
  }
  /* むし */
  for(const b of bugs){
    const d = dist(player.x,player.y, b.x,b.y);
    if(d < 27) cands.push({d:d*0.9, f:()=>{
      if(Math.random() < 0.75){
        bugInv[b.name] = (bugInv[b.name]||0)+1;
        const isNew = !caughtBug.has(b.name);
        caughtBug.add(b.name);
        popup = { text:`🦋 ${b.name}を つかまえた！`+(isNew?"　✨ずかんに のった！":""), t:2.4 };
        jingle();
        bugs.splice(bugs.indexOf(b),1);
        markSave();
      }else{
        floatTexts.push({x:b.x, y:b.y-8, text:"にげられた！", t:1.4});
        b.tx = b.hx + (Math.random()*240-120); b.ty = b.hy + (Math.random()*150-75); b.t = 3;
      }
    }});
  }
  /* りんごの木 */
  for(const tr of trees){
    if(!tr.fruit || tr.fruitN<=0) continue;
    const d = dist(player.x,player.y, tr.tx*T+12, tr.ty*T+12);
    if(d < 39) cands.push({d, f:()=>{ tr.shakeT = 0.6; tr.pendingDrop = 0.3; }});
  }
  /* キラキラ（たからさがし） */
  for(const s of digSpots){
    const d = dist(player.x,player.y, s.tx*T+12, s.ty*T+12);
    if(d < 36) cands.push({d, f:()=>digAt(s)});
  }
  /* わんちゃん なでる */
  {
    const d = dist(player.x,player.y, dog.x,dog.y);
    if(d < 45) cands.push({d:d*1.05, f:()=>{
      petCount++;
      dog.happyT = 1.2; dog.sayT = 1.2; dog.jumpT = 0.45;
      bark();
      for(let i=0;i<3;i++){
        hearts.push({x:dog.x+(Math.random()*20-10), y:dog.y-15-i*4,
                     vy:-(21+Math.random()*15), life:1.2+i*0.15});
      }
      markSave();
    }});
  }
  /* つり */
  {
    const [dx,dy] = dirVec();
    const wx = player.x+dx*30, wy = player.y+dy*30;
    const tx = Math.floor(wx/T), ty = Math.floor(wy/T);
    if(tx>=0&&ty>=0&&tx<MW&&ty<MH && ground[ty][tx]==="w"){
      cands.push({d:40, f:()=>startFishing(wx, wy)});
    }
  }
  if(cands.length){
    cands.sort((a,b)=>a.d-b.d);
    cands[0].f();
    return;
  }
  /* なにもなければ ボールあそび */
  if(hasBall && ball.state==="none") throwBall();
}

/* ================= 更新 ================= */
let time = 0, dayOffset = 0;
const DAY_LEN = 240;
function dayPhase(){
  const t = (time + dayOffset) % DAY_LEN;
  /* 0-140昼, 140-170ゆうやけ, 170-225よる, 225-240あさ */
  let sun = 0, night = 0;
  if(t>=140 && t<170) sun = Math.sin((t-140)/30*Math.PI);
  if(t>=170 && t<225) night = Math.min(1, (t-170)/12);
  else if(t>=225) night = Math.max(0, 1-(t-225)/15);
  if(t>=225) sun = Math.sin((t-225)/15*Math.PI)*0.5;
  return {sun, night, isNight: night>0.5};
}
function update(dt){
  time += dt;
  tickMusic();
  const phase = dayPhase();

  if(actPressed){ tryAction(); actPressed = false; }

  /* --- プレイヤー --- */
  let vx=0, vy=0;
  if(!dialog){
    if(keys["ArrowLeft"]||keys["a"]) vx=-1;
    if(keys["ArrowRight"]||keys["d"]) vx=1;
    if(keys["ArrowUp"]||keys["w"]) vy=-1;
    if(keys["ArrowDown"]||keys["s"]) vy=1;
    if(!vx && !vy){ vx = touchVec.x; vy = touchVec.y; }
  }
  if(fishing && (vx||vy)) fishing = null;
  const sp = 117*dt;
  const vlen = Math.hypot(vx,vy);
  if(vlen > 1){ vx/=vlen; vy/=vlen; }
  player.moving = vlen > 0.05;
  if(player.moving){
    if(Math.abs(vx)>Math.abs(vy)) player.dir = vx>0?"right":"left";
    else if(vy) player.dir = vy>0?"down":"up";
    const nx = player.x+vx*sp, ny = player.y+vy*sp;
    if(!blocked(nx,player.y)) player.x = nx;
    if(!blocked(player.x,ny)) player.y = ny;
    player.animT += dt;
    if(player.animT>0.14){ player.animT=0; player.frame^=1; }
    player.idleT = 0;
  }else{
    player.frame = 0; player.idleT += dt;
  }

  /* --- 会話タイプライター --- */
  if(dialog && dialog.chars < dialog.text.length){
    const before = Math.floor(dialog.chars);
    dialog.chars = Math.min(dialog.text.length, dialog.chars + dt*20);
    const after = Math.floor(dialog.chars);
    if(after > before && after % 2 === 0){
      const ch = dialog.text[after-1];
      if(ch !== " " && ch !== "、" && ch !== "。") voiceBlip(dialog.v.pitch);
    }
  }

  /* --- 釣り --- */
  if(fishing){
    fishing.t += dt;
    if(fishing.state==="wait" && fishing.t >= fishing.biteT){
      fishing.state = "bite"; fishing.hookT = 0.8;
      sfx("sine", 700, 0.1, 0.12, 300);
    }
    if(fishing.state==="bite"){
      fishing.hookT -= dt;
      if(fishing.hookT <= 0) endFishing("にげられちゃった…");
    }
  }

  /* --- ボール --- */
  if(ball.state==="fly"){
    ball.x += ball.vx*dt; ball.y += ball.vy*dt;
    ball.z += ball.vz*dt; ball.vz -= 225*dt;
    ball.vx *= 0.99; ball.vy *= 0.99;
    if(ball.z <= 0){
      ball.z = 0;
      if(Math.abs(ball.vz) > 33){ ball.vz = -ball.vz*0.45; }
      else{
        const tx = Math.floor(ball.x/T), ty = Math.floor(ball.y/T);
        if(tx<1||ty<1||tx>=MW-1||ty>=MH-1 || ground[ty]?.[tx]==="w"){
          floatTexts.push({x:ball.x, y:ball.y-8, text:"ぽちゃん…", t:1.4});
          splash();
          ball.state = "none";
        }else ball.state = "ground";
      }
    }
  }

  /* --- 足あとトレイル --- */
  const dtr = Math.hypot(player.x-lastTrail.x, player.y-lastTrail.y);
  if(dtr > 4.5){
    trail.push({x:lastTrail.x, y:lastTrail.y});
    lastTrail = {x:player.x, y:player.y};
    if(trail.length > 30) trail.shift();
  }

  /* --- わんちゃん --- */
  dog.wagPhase += dt * (dog.happyT>0 ? 18 : 5);
  if(dog.happyT>0) dog.happyT -= dt;
  if(dog.sayT>0) dog.sayT -= dt;
  if(dog.jumpT>0) dog.jumpT -= dt;
  dog.moving = false;
  if(ball.state==="fly" || ball.state==="ground"){
    /* ボールを おいかける！ */
    const dx = ball.x-dog.x, dy = ball.y-dog.y, d = Math.hypot(dx,dy);
    if(d > 7){
      const dsp = 177*dt;
      const nx = dog.x+dx/d*dsp, ny = dog.y+dy/d*dsp;
      dog.x = nx; dog.y = ny;
      dog.moving = true;
      if(Math.abs(dx) > 1.5) dog.face = dx>0?"r":"l";
      dog.mode = Math.abs(dx) > Math.abs(dy)*1.15 ? "side" : (dy>0 ? "down" : "up");
      dog.animT += dt;
      if(dog.animT>0.1){ dog.animT=0; dog.frame^=1; }
    }else if(ball.state==="ground"){
      ball.state = "carried";
      bark();
    }
  }else if(ball.state==="carried"){
    const dx = player.x-dog.x, dy = player.y-dog.y, d = Math.hypot(dx,dy);
    if(d > 24){
      const dsp = 150*dt;
      dog.x += dx/d*dsp; dog.y += dy/d*dsp;
      dog.moving = true;
      if(Math.abs(dx) > 1.5) dog.face = dx>0?"r":"l";
      dog.mode = Math.abs(dx) > Math.abs(dy)*1.15 ? "side" : (dy>0 ? "down" : "up");
      dog.animT += dt;
      if(dog.animT>0.1){ dog.animT=0; dog.frame^=1; }
    }else{
      ball.state = "none";
      dog.happyT = 1.5; dog.sayT = 1.2; dog.jumpT = 0.45;
      floatTexts.push({x:dog.x, y:dog.y-18, text:"もってきた！ えらい！", t:1.6});
      for(let i=0;i<3;i++) hearts.push({x:dog.x+(Math.random()*20-10), y:dog.y-15-i*4, vy:-(21+Math.random()*15), life:1.2});
      bark();
      trail.length = 0; lastTrail = {x:player.x, y:player.y};
    }
    ball.x = dog.x + (dog.face==="r"?12:-12); ball.y = dog.y-3; ball.z = 6;
  }else if(trail.length > 6){
    const tgt = trail[0];
    const dx = tgt.x-dog.x, dy = tgt.y-dog.y;
    const d = Math.hypot(dx,dy);
    const dsp = (trail.length>16 ? 180 : 111)*dt;
    if(d > 2){
      dog.x += dx/d*dsp; dog.y += dy/d*dsp;
      dog.moving = true;
      if(Math.abs(dx) > 1.5) dog.face = dx>0?"r":"l";
      dog.mode = Math.abs(dx) > Math.abs(dy)*1.15 ? "side" : (dy>0 ? "down" : "up");
      dog.animT += dt;
      if(dog.animT>0.12){ dog.animT=0; dog.frame^=1; }
    }
    if(d <= Math.max(2.5, dsp)) trail.shift();
  }
  if(!dog.moving) dog.frame = 0;

  /* --- 住民AI --- */
  for(const v of VILLAGERS){
    const nearPlayer = dist(player.x,player.y, v.x,v.y) < 42;
    if(dialog && dialog.v === v){ v.state = "idle"; continue; }
    v.wt -= dt;
    if(nearPlayer){ v.state = "idle"; v.wt = Math.max(v.wt, 0.6); }
    else if(v.wt <= 0){
      if(v.state === "idle" && Math.random() < 0.6){
        v.tx = v.hx + (Math.random()*84-42);
        v.ty = v.hy + (Math.random()*60-30);
        v.state = "walk";
        v.wt = 6;
      }else{
        v.state = "idle";
        v.wt = 1.2 + Math.random()*2.5;
      }
    }
    if(v.state === "walk"){
      const dx = v.tx-v.x, dy = v.ty-v.y;
      const d = Math.hypot(dx,dy);
      if(d < 2){ v.state="idle"; v.wt = 1.5+Math.random()*2; }
      else{
        const step = 33*dt;
        const nx = v.x+dx/d*step, ny = v.y+dy/d*step;
        if(!blocked(nx,ny)){ v.x = nx; v.y = ny; v.walkT += dt; }
        else{ v.state="idle"; v.wt = 1+Math.random()*2; }
      }
    }
  }
  /* クエスト発生 */
  questTimer -= dt;
  if(questTimer <= 0){
    questTimer = 18 + Math.random()*15;
    if(Math.random() < 0.6) tryAssignQuest();
  }

  /* --- いきもの --- */
  for(const c of critters){
    if(c.duck){
      c.ang += dt*0.4;
      c.x = POND.cx*T + Math.cos(c.ang)*69;
      c.y = POND.cy*T + Math.sin(c.ang)*36;
    }
  }

  /* --- 木：ゆれ・りんご --- */
  for(const tr of trees){
    if(tr.shakeT>0) tr.shakeT -= dt;
    if(tr.pendingDrop>0){
      tr.pendingDrop -= dt;
      if(tr.pendingDrop<=0 && tr.fruitN>0){
        const bx = tr.tx*T+12, by = tr.ty*T;
        for(let i=0;i<tr.fruitN;i++){
          groundItems.push({ x:bx+(i-1)*12+(Math.random()*6-3), y:by-15,
            vy:-30-Math.random()*30, gy:by+24+Math.random()*10, type:"apple" });
        }
        tr.fruitN = 0; tr.regrowT = 45;
        sfx("triangle", 500, 0.1, 0.08, 300);
      }
    }
    if(tr.fruit && tr.fruitN===0){
      tr.regrowT -= dt;
      if(tr.regrowT<=0) tr.fruitN = 3;
    }
  }
  for(let i=groundItems.length-1;i>=0;i--){
    const it = groundItems[i];
    it.vy += 300*dt; it.y += it.vy*dt;
    if(it.y > it.gy){ it.y = it.gy; it.vy = Math.abs(it.vy)>38 ? -it.vy*0.4 : 0; }
    if(dist(player.x,player.y,it.x,it.y) < 22){
      pocket.apple++;
      floatTexts.push({x:it.x, y:it.y-6, text:"🍎 +1", t:1.2});
      popSound();
      groundItems.splice(i,1);
      markSave();
    }
  }

  /* --- たからさがしスポット --- */
  digRespawnT -= dt;
  if(digSpots.length < 3 && digRespawnT <= 0){
    digRespawnT = 4;
    for(let i=0;i<30;i++){
      const tx = 2+Math.floor(Math.random()*(MW-4)), ty = 2+Math.floor(Math.random()*(MH-4));
      if(ground[ty][tx]==="g" && !solid[ty][tx] && dist(player.x,player.y,tx*T,ty*T) > 120){
        digSpots.push({tx,ty}); break;
      }
    }
  }

  /* --- むし --- */
  if(Math.floor(time*0.5) !== Math.floor((time-dt)*0.5)) manageBugs(phase.isNight);
  for(const b of bugs){
    b.t -= dt;
    if(b.t<=0){
      b.t = 2+Math.random()*3;
      b.tx = b.hx + (Math.random()*120-60);
      b.ty = b.hy + (Math.random()*76-38);
    }
    const spd = b.kind==="tonbo" ? 1.4 : 1;
    b.x += ((b.tx-b.x)*0.6*dt + Math.sin(time*3+b.ph)*12*dt)*spd;
    b.y += ((b.ty-b.y)*0.6*dt + Math.cos(time*4+b.ph)*9*dt)*spd;
  }

  /* --- はなびら --- */
  for(const tr of trees){
    if(!tr.cherry) continue;
    if(Math.random() < 0.7*dt){
      petals.push({ x:tr.tx*T+12+(Math.random()*36-18), y:tr.ty*T-12+(Math.random()*16-8),
        life:4, ph:Math.random()*6 });
    }
  }
  for(let i=petals.length-1;i>=0;i--){
    const p = petals[i];
    p.life -= dt; p.y += 18*dt; p.x += Math.sin(time*2.4+p.ph)*15*dt;
    if(p.life<=0) petals.splice(i,1);
  }
  for(let i=hearts.length-1;i>=0;i--){
    const hh = hearts[i];
    hh.life -= dt; hh.y += hh.vy*dt; hh.vy *= 0.96;
    if(hh.life<=0) hearts.splice(i,1);
  }
  if(Math.random() < 1.2*dt){
    const h = houses[Math.floor(Math.random()*houses.length)];
    puffs.push({x:h.tx*T+75, y:h.ty*T+3, life:2.5, r:3});
  }
  for(let i=puffs.length-1;i>=0;i--){
    const p = puffs[i];
    p.life -= dt;
    if(p.dirt){ p.y -= 30*dt; }
    else{ p.y -= 13*dt; p.x += Math.sin(time+p.y*0.2)*6*dt; p.r += 2.4*dt; }
    if(p.life<=0) puffs.splice(i,1);
  }
  for(const c of clouds){
    c.x += c.v*dt;
    if(c.x > MW*T+80) c.x = -80;
  }
  if(popup){ popup.t -= dt; if(popup.t<=0) popup = null; }
  for(let i=floatTexts.length-1;i>=0;i--){
    const f = floatTexts[i];
    f.t -= dt; f.y -= 14*dt;
    if(f.t<=0) floatTexts.splice(i,1);
  }

  /* --- オートセーブ --- */
  saveTimer -= dt;
  if(saveTimer <= 0){ saveTimer = 6; if(saveDirty) doSave(); }
}

/* ================= 描画 ================= */
let cam = {x:0,y:0};

function drawGround(){
  const x0 = Math.floor(cam.x/T), y0 = Math.floor(cam.y/T);
  for(let ty=y0; ty<=y0+VH/T; ty++){
    for(let tx=x0; tx<=x0+VW/T; tx++){
      if(tx<0||ty<0||tx>=MW||ty>=MH) continue;
      const px = tx*T, py = ty*T;
      const v = ground[ty][tx];
      const h = h32(tx,ty);
      ctx.fillStyle = ((tx+ty)&1) ? "#8ecf6f" : "#88c968";
      ctx.fillRect(px,py,T,T);
      if(v==="g" || v==="f"){
        if(h%5===0){
          ctx.fillStyle = "#75bb55";
          const ox = 4+h%14, oy = 4+(h>>3)%14;
          ctx.fillRect(px+ox,py+oy,2,5); ctx.fillRect(px+ox+3,py+oy+2,2,3);
        }
        if(h%23===0){ ctx.fillStyle="#fff"; ctx.fillRect(px+(h%18)+3, py+((h>>4)%18)+3, 3,3); }
      }
      if(v==="f"){
        const cols = ["#ff6f91","#ffd166","#ffffff","#c58bf2"];
        for(let i=0;i<3;i++){
          const fx = px+3+((h>>(i*3))%15), fy = py+3+((h>>(i*3+2))%15);
          ctx.fillStyle = "#4f9c3d"; ctx.fillRect(fx+2,fy+3,2,5);
          ctx.fillStyle = cols[(h>>i)%4];
          ctx.fillRect(fx,fy,5,2); ctx.fillRect(fx+1,fy-1,3,4);
          ctx.fillStyle = "#ffe9a8"; ctx.fillRect(fx+2,fy,1,1);
        }
      }
      if(v==="p"){
        ctx.fillStyle = "#eed9a9"; ctx.fillRect(px,py,T,T);
        ctx.fillStyle = "#dcc28a";
        const isP = (x,y)=> x>=0&&y>=0&&x<MW&&y<MH&&(ground[y][x]==="p"||ground[y][x]==="d");
        if(!isP(tx,ty-1)) ctx.fillRect(px,py,T,3);
        if(!isP(tx,ty+1)) ctx.fillRect(px,py+T-3,T,3);
        if(!isP(tx-1,ty)) ctx.fillRect(px,py,3,T);
        if(!isP(tx+1,ty)) ctx.fillRect(px+T-3,py,3,T);
        if(h%6===0){ ctx.fillStyle="#e0c58f"; ctx.fillRect(px+(h%16)+3,py+((h>>5)%16)+3,3,3); }
      }
      if(v==="w" || v==="d"){
        ctx.fillStyle = "#6ec6e6"; ctx.fillRect(px,py,T,T);
        const isW = (x,y)=> x>=0&&y>=0&&x<MW&&y<MH&&(ground[y][x]==="w"||ground[y][x]==="d");
        ctx.fillStyle = "#bfe9f6";
        if(!isW(tx,ty-1)) ctx.fillRect(px,py,T,3);
        if(!isW(tx,ty+1)) ctx.fillRect(px,py+T-3,T,3);
        if(!isW(tx-1,ty)) ctx.fillRect(px,py,3,T);
        if(!isW(tx+1,ty)) ctx.fillRect(px+T-3,py,3,T);
        ctx.fillStyle = "#8fd7f0";
        const w1 = (h + Math.floor(time*2))%4;
        ctx.fillRect(px+3+w1*3, py+8+(h%9), 6,2);
        if((h + Math.floor(time*1.5))%17===0){
          ctx.fillStyle="#eafaff"; ctx.fillRect(px+9,py+12,3,3);
        }
      }
      if(v==="d"){
        /* さんばしの いた */
        ctx.fillStyle = "#b07a4a"; ctx.fillRect(px,py+3,T,18);
        ctx.fillStyle = "#96633a";
        ctx.fillRect(px,py+8,T,2); ctx.fillRect(px,py+14,T,2);
        ctx.fillStyle = "#4a3228";
        ctx.fillRect(px,py+3,T,2); ctx.fillRect(px,py+20,T,2);
        if(tx%2===0){ ctx.fillRect(px+3,py+21,3,3); ctx.fillRect(px+18,py+21,3,3); }
      }
    }
  }
}

function drawTree(tr){
  const x = tr.tx*T, y = tr.ty*T;
  let s = Math.round(Math.sin(time*0.9 + tr.tx*0.7));
  if(tr.shakeT > 0.2) s = Math.round(Math.sin(time*32)*2);
  ctx.fillStyle = "#4a3228"; ctx.fillRect(x+8,y+5,9,19);
  ctx.fillStyle = "#8a5a3a"; ctx.fillRect(x+9,y+6,7,17);
  const cx = x+12+s, cy = y-5;
  if(tr.cherry){
    circle(cx,cy+3,20,"#e087ac");
    circle(cx,cy-2,17,"#ff9ec4");
    circle(cx-6,cy-8,8,"#ffc9dd");
    ctx.fillStyle="#fff";
    ctx.fillRect(cx+5,cy-9,3,3); ctx.fillRect(cx-12,cy+2,3,3); ctx.fillRect(cx+9,cy+5,3,3);
  }else{
    circle(cx,cy+3,20,"#4f9c3d");
    circle(cx,cy-2,17,"#67b34e");
    circle(cx-6,cy-8,8,"#8bcf70");
    if(tr.fruit && tr.fruitN>0){
      const offs = [[-11,-3],[2,-11],[6,2]];
      for(let i=0;i<tr.fruitN;i++){
        const ax = cx+offs[i][0], ay = cy+offs[i][1];
        ctx.fillStyle="#e0303a"; ctx.fillRect(ax,ay,5,5);
        ctx.fillStyle="#ff7a80"; ctx.fillRect(ax,ay,2,2);
      }
    }
  }
}
function circle(cx,cy,r,col){
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
}

function drawHouse(h, nightF){
  const x = h.tx*T, y = h.ty*T;
  ctx.fillStyle = "#4a3228"; ctx.fillRect(x+8,y+40,81,53);
  ctx.fillStyle = "#fdf3e3"; ctx.fillRect(x+11,y+43,75,47);
  for(const wx of [x+20, x+65]){
    ctx.fillStyle="#4a3228"; ctx.fillRect(wx-2,y+51,17,17);
    ctx.fillStyle = nightF>0.4 ? "#ffd97a" : "#aee3f5";
    ctx.fillRect(wx,y+53,13,13);
    ctx.fillStyle= nightF>0.4 ? "#f0b53e" : "#fff";
    ctx.fillRect(wx+6,y+53,2,13); ctx.fillRect(wx,y+59,13,2);
  }
  ctx.fillStyle="#4a3228"; ctx.fillRect(x+39,y+62,20,28);
  ctx.fillStyle="#a3703f"; ctx.fillRect(x+41,y+64,16,26);
  ctx.fillStyle="#ffd166"; ctx.fillRect(x+53,y+75,3,3);
  for(let r=0;r<39;r++){
    const half = 9 + r*1.05;
    ctx.fillStyle = r>34 ? h.roofD : h.roof;
    ctx.fillRect(Math.round(x+48-half), y+3+r, Math.round(half*2), 1);
  }
  ctx.fillStyle = h.roofD;
  ctx.fillRect(x+3,y+40,90,3);
  ctx.fillStyle="#b8646a"; ctx.fillRect(x+69,y+3,12,18);
  ctx.fillStyle="#95484f"; ctx.fillRect(x+69,y+3,12,4);
}

function drawFountain(){
  const cx = (FOUNTAIN.tx+2)*T, cy = (FOUNTAIN.ty+2)*T;
  /* そとわ */
  ctx.fillStyle = "#9aa7b5";
  ctx.beginPath(); ctx.ellipse(cx,cy, 45,32,0,0,7); ctx.fill();
  ctx.fillStyle = "#c3ceda";
  ctx.beginPath(); ctx.ellipse(cx,cy-3, 45,32,0,0,7); ctx.fill();
  /* みず */
  ctx.fillStyle = "#6ec6e6";
  ctx.beginPath(); ctx.ellipse(cx,cy-3, 36,24,0,0,7); ctx.fill();
  ctx.fillStyle = "#8fd7f0";
  for(let i=0;i<3;i++){
    const a = time*1.2+i*2.1;
    ctx.beginPath(); ctx.ellipse(cx,cy-3, 12+((a*12)%24), 8+((a*8)%15), 0,0,7);
    ctx.globalAlpha = 0.35; ctx.stroke(); ctx.globalAlpha = 1;
  }
  /* まんなかの とう */
  ctx.fillStyle = "#8d9aa8"; ctx.fillRect(cx-6, cy-24, 12, 21);
  ctx.fillStyle = "#c3ceda"; ctx.fillRect(cx-11, cy-27, 22, 6);
  ctx.fillStyle = "#e8f6ff";
  for(let i=0;i<4;i++){
    const t2 = (time*1.6+i*0.55)%1;
    const fx = cx + Math.sin(i*1.7)*15*t2;
    const fy = cy-24 + 24*t2*t2;
    ctx.fillRect(Math.round(fx), Math.round(fy), 3,3);
  }
  ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx,cy-3, 36,24,0,0,7); ctx.stroke();
}

function drawBench(b){

function drawGirl(){
  if(SPR.girl){
    const set = player.dir==="left" ? SPR.girl.side
              : player.dir==="right" ? SPR.girl.sideR
              : player.dir==="up" ? SPR.girl.up : SPR.girl.down;
    const fr = player.moving ? set[1+player.frame] : set[0];
    ctx.drawImage(fr.c, Math.round(player.x-fr.w/2), Math.round(player.y-fr.h+4));
    return;
  }
  const img = GIRL[player.dir][player.moving ? player.frame : 0];
  ctx.drawImage(img, Math.round(player.x-6), Math.round(player.y-13));
}
function drawDog(){
  const jump = dog.jumpT>0 ? Math.round(Math.sin(dog.jumpT/0.45*Math.PI)*8) : 0;
  if(SPR.dog){
    const set = dog.mode==="down" ? SPR.dog.down
              : dog.mode==="up" ? SPR.dog.up
              : (dog.face==="r" ? SPR.dog.sideR : SPR.dog.side);
    const fr = dog.moving ? set[1+dog.frame] : set[0];
    const dx = Math.round(dog.x-fr.w/2), dy = Math.round(dog.y-fr.h+6) - jump;
    ctx.drawImage(fr.c, dx, dy);
    if(bandana){
      ctx.fillStyle = bandana;
      ctx.fillRect(Math.round(dog.x-6), Math.round(dog.y - fr.h*0.45) - jump, 12, 4);
    }
    return;
  }
  const face = dog.face==="r" ? "right" : "left";
  const img = DOG[face][dog.moving ? dog.frame : 0];
  const dx = Math.round(dog.x-8), dy = Math.round(dog.y-8) - jump;
  ctx.drawImage(img, dx, dy);
  const wag = Math.sin(dog.wagPhase) > 0;
  const ax = dog.face==="r" ? dx+2 : dx+13;
  const s  = dog.face==="r" ? 1 : -1;
  ctx.fillStyle = PAL.O;
  if(wag){
    ctx.fillRect(ax-1*s-1, dy+4, 2,2); ctx.fillRect(ax-2*s-1, dy+2, 2,2);
    ctx.fillStyle = PAL.C; ctx.fillRect(ax-2*s-1, dy+0, 2,2);
  }else{
    ctx.fillRect(ax-2*s-1, dy+5, 2,2); ctx.fillRect(ax-3*s-1, dy+4, 2,2);
    ctx.fillStyle = PAL.C; ctx.fillRect(ax-4*s-1, dy+3, 2,2);
  }
}
function drawLeash(){
  if(ball.state !== "none") return;   /* ボールあそび中は リードなし */
  const hx = player.x + (player.dir==="left"?-9:player.dir==="right"?9:0);
  const hy = player.y - 8;
  const nx = dog.x + (dog.face==="r"?9:-9), ny = dog.y - 12;
  ctx.strokeStyle = "#c9575c"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(Math.round(hx)+.5, Math.round(hy)+.5);
  ctx.quadraticCurveTo((hx+nx)/2, Math.max(hy,ny)+8, Math.round(nx)+.5, Math.round(ny)+.5);
  ctx.stroke();
}
function drawVillager(v){
  const wf = Math.floor(v.walkT*7)%2;
  if(SPR[v.key]){
    const sh = SPR[v.key];
    let set = sh.down, fr;
    if(v.state==="walk"){
      const dx = v.tx-v.x, dy = v.ty-v.y;
      if(Math.abs(dx) > Math.abs(dy)*1.15) set = dx>0 ? sh.sideR : sh.side;
      else set = dy>0 ? sh.down : sh.up;
      fr = set[1+wf];
    }else fr = set[0];
    ctx.drawImage(fr.c, Math.round(v.x-fr.w/2), Math.round(v.y-fr.h+4));
    return;
  }
  const img = v.img[v.state==="walk" ? wf : 0];
  const bob = v.state==="walk" ? wf : 0;
  ctx.drawImage(img, Math.round(v.x-6), Math.round(v.y-img.height+3) - bob);
}
function drawBug(b, nightF){
  const bx = Math.round(b.x), by = Math.round(b.y);
  if(b.kind==="chou"){
    const open = Math.floor(time*10+b.ph)%2===0;
    ctx.fillStyle = b.col;
    if(open){ ctx.fillRect(bx-5,by-2,3,3); ctx.fillRect(bx+2,by-2,3,3); }
    else{ ctx.fillRect(bx-3,by-3,3,3); ctx.fillRect(bx,by-3,3,3); }
    ctx.fillStyle="#4a3228"; ctx.fillRect(bx-1,by-2,2,3);
  }else if(b.kind==="bee"){
    ctx.fillStyle="#ffd166"; ctx.fillRect(bx-2,by-2,5,3);
    ctx.fillStyle="#4a3228"; ctx.fillRect(bx,by-2,2,3);
    if(Math.floor(time*14+b.ph)%2===0){ ctx.fillStyle="rgba(255,255,255,0.85)"; ctx.fillRect(bx-2,by-5,5,2); }
  }else if(b.kind==="tonbo"){
    ctx.fillStyle="#66c9d8"; ctx.fillRect(bx-5,by,9,2);
    ctx.fillStyle="#4a3228"; ctx.fillRect(bx+4,by,2,2);
    if(Math.floor(time*16+b.ph)%2===0){
      ctx.fillStyle="rgba(255,255,255,0.8)";
      ctx.fillRect(bx-3,by-2,3,2); ctx.fillRect(bx,by-2,3,2);
    }
  }else if(b.kind==="hotaru"){
    const pulse = 0.4+0.6*Math.abs(Math.sin(time*2.2+b.ph));
    ctx.fillStyle="#4a3228"; ctx.fillRect(bx,by,2,3);
    ctx.fillStyle=`rgba(210,255,120,${pulse})`;
    ctx.fillRect(bx-1,by+2,4,3);
    ctx.fillStyle=`rgba(210,255,120,${pulse*0.28})`;
    ctx.beginPath(); ctx.arc(bx,by+2,8,0,7); ctx.fill();
  }
}

function drawWorld(){
  const phase = dayPhase();
  cam.x = Math.round(clamp(player.x - VW/2, 0, MW*T-VW));
  cam.y = Math.round(clamp(player.y - VH/2, 0, MH*T-VH));
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  drawGround();

  /* キラキラ（たからスポット） */
  for(const s of digSpots){
    const px = s.tx*T+12, py = s.ty*T+12;
    const f = Math.floor(time*4)%2;
    ctx.fillStyle = f ? "#fff" : "#ffe9a0";
    ctx.fillRect(px-2, py-5, 3, 3); ctx.fillRect(px-2, py+2, 3, 3);
    ctx.fillRect(px-5, py-2, 3, 3); ctx.fillRect(px+2, py-2, 3, 3);
    if(!f){ ctx.fillRect(px-2, py-2, 3, 3); }
  }

  /* 影 */
  ctx.fillStyle = "rgba(60,90,50,0.25)";
  ctx.beginPath(); ctx.ellipse(player.x, player.y+4, 11,4,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(dog.x, dog.y+5, 12,4,0,0,7); ctx.fill();
  for(const v of VILLAGERS){
    ctx.beginPath(); ctx.ellipse(v.x, v.y+4, 11,4,0,0,7); ctx.fill();
  }
  if(ball.state!=="none"){
    ctx.beginPath(); ctx.ellipse(ball.x, ball.y+3, 4,2,0,0,7); ctx.fill();
  }

  drawLeash();

  if(fishing){
    const hx = player.x + dirVec()[0]*8, hy = player.y - 9;
    const dip = fishing.state==="bite" ? 3 : Math.round(Math.sin(time*3)*1.5);
    ctx.strokeStyle="rgba(80,60,50,0.8)"; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(Math.round(hx)+.5, Math.round(hy)+.5);
    ctx.lineTo(Math.round(fishing.bx)+.5, Math.round(fishing.by+dip)-3+.5);
    ctx.stroke();
    ctx.fillStyle="#e0303a"; ctx.fillRect(Math.round(fishing.bx)-3, Math.round(fishing.by+dip)-3, 6,4);
    ctx.fillStyle="#fff"; ctx.fillRect(Math.round(fishing.bx)-3, Math.round(fishing.by+dip)+1, 6,2);
    ctx.strokeStyle="rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.ellipse(fishing.bx, fishing.by+3, 8+Math.sin(time*4)*2, 3.6,0,0,7);
    ctx.stroke();
  }

  /* y ソートして描画 */
  const items = [];
  for(const tr of trees) items.push({y:(tr.ty+1)*T, f:()=>drawTree(tr)});
  for(const h of houses) items.push({y:(h.ty+4)*T, f:()=>drawHouse(h, phase.night)});
  for(const b of bushes) items.push({y:(b[1]+1)*T, f:()=>drawBush(b)});
  for(const b of benches) items.push({y:(b.ty+1)*T, f:()=>drawBench(b)});
  for(const l of lamps) items.push({y:(l[1]+1)*T, f:()=>drawLamp(l, phase.night)});
  items.push({y:(FOUNTAIN.ty+FOUNTAIN.th)*T, f:drawFountain});
  items.push({y:(STALL.ty+2)*T, f:drawStall});
  for(const c of critters){
    items.push({y:c.y+12, f:()=>{
      const bob = Math.round(Math.sin(time*2.5+c.phase)*1.5);
      if(c.duck){
        ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.ellipse(c.x, c.y+11, 12+Math.sin(time*2)*2, 4.5,0,0,7); ctx.stroke();
        ctx.drawImage(c.img, Math.round(c.x-12), Math.round(c.y-6+bob*0.5), c.img.width*2, c.img.height*2);
      }else{
        ctx.drawImage(c.img, Math.round(c.x-8), Math.round(c.y-c.img.height*2+6+bob), c.img.width*2, c.img.height*2);
      }
    }});
  }
  for(const v of VILLAGERS) items.push({y:v.y+3, f:()=>drawVillager(v)});
  for(const it of groundItems){
    items.push({y:it.y+3, f:()=>{
      ctx.fillStyle="#e0303a"; ctx.fillRect(Math.round(it.x)-2, Math.round(it.y)-3, 5,5);
      ctx.fillStyle="#ff7a80"; ctx.fillRect(Math.round(it.x)-2, Math.round(it.y)-3, 2,2);
      ctx.fillStyle="#4f9c3d"; ctx.fillRect(Math.round(it.x), Math.round(it.y)-5, 2,2);
    }});
  }
  if(ball.state!=="none"){
    items.push({y:ball.y+3, f:()=>{
      const bx = Math.round(ball.x), by = Math.round(ball.y - ball.z);
      ctx.fillStyle="#4a3228"; ctx.fillRect(bx-3,by-4,7,7);
      ctx.fillStyle="#e0475a"; ctx.fillRect(bx-2,by-3,5,5);
      ctx.fillStyle="#fff"; ctx.fillRect(bx-2,by-3,5,2);
    }});
  }
  items.push({y:player.y+3, f:drawGirl});
  items.push({y:dog.y+4, f:drawDog});
  items.sort((a,b)=>a.y-b.y);
  for(const it of items) it.f();

  for(const p of puffs){
    if(p.dirt){
      ctx.fillStyle = `rgba(150,110,70,${Math.min(0.8, p.life)})`;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), 3,3);
    }else{
      ctx.fillStyle = `rgba(240,240,245,${Math.min(0.6, p.life*0.35)})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    }
  }
  for(const p of petals){
    ctx.fillStyle = (p.ph%2<1) ? "#ffc9dd" : "#ffb0cc";
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 3,3);
  }
  for(const hh of hearts){
    drawHeart(Math.round(hh.x), Math.round(hh.y), hh.life>0.4?1:hh.life/0.4);
  }
  for(const b of bugs) drawBug(b, phase.night);
  for(const c of clouds){
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, 26*c.s, 8*c.s, 0,0,7);
    ctx.ellipse(c.x-14*c.s, c.y+4, 14*c.s, 6*c.s, 0,0,7);
    ctx.ellipse(c.x+15*c.s, c.y+3, 15*c.s, 6*c.s, 0,0,7);
    ctx.fill();
  }
  ctx.restore();

  /* あたたかい光 → 時間で かわる */
  const vg = ctx.createRadialGradient(VW/2,VH/2, Math.min(VW,VH)*0.38, VW/2,VH/2, Math.max(VW,VH)*0.68);
  vg.addColorStop(0,"rgba(255,240,200,0)");
  vg.addColorStop(1,"rgba(255,190,140,0.15)");
  ctx.fillStyle = vg; ctx.fillRect(0,0,VW,VH);
  if(phase.sun > 0){
    ctx.fillStyle = `rgba(255,140,60,${0.18*phase.sun})`;
    ctx.fillRect(0,0,VW,VH);
  }
  if(phase.night > 0){
    ctx.fillStyle = `rgba(20,28,75,${0.42*phase.night})`;
    ctx.fillRect(0,0,VW,VH);
  }
}
function drawHeart(x,y,a){
  ctx.globalAlpha = a;
  ctx.fillStyle = "#ff5f8f";
  ctx.fillRect(x-3,y-3,3,3); ctx.fillRect(x+1,y-3,3,3);
  ctx.fillRect(x-3,y-1,7,3); ctx.fillRect(x-2,y+2,5,2); ctx.fillRect(x-1,y+4,3,1);
  ctx.globalAlpha = 1;
}

/* ================= オーバーレイUI ================= */
function drawUI(){
  const wpx = ui.width, hpx = ui.height;
  uictx.clearRect(0,0,wpx,hpx);
  const psc = wpx / VW;           /* 位置変換用 */
  const sc = psc * 1.5;           /* 文字・ふきだしサイズ用（320px時代の基準を維持） */
  const W2S = (wx,wy)=>[(wx-cam.x)*psc, (wy-cam.y)*psc];

  for(const c of critters){
    const d = dist(player.x,player.y, c.x,c.y);
    if(d < 78){
      const [sx,sy] = W2S(c.x, c.y - (c.duck?16:c.img.height*2) - 6);
      bubble(sx, sy + Math.sin(time*3)*2*sc/3, c.msg, sc);
    }
  }
  /* 住民：クエストの「！」と はなすプロンプト */
  for(const v of VILLAGERS){
    if(v.quest){
      const [sx,sy] = W2S(v.x, v.y - v.h - 12);
      const fs = 6*sc;
      uictx.font = `bold ${fs}px sans-serif`;
      uictx.textAlign = "center";
      uictx.strokeStyle = "#fff"; uictx.lineWidth = 3;
      uictx.strokeText("❗", sx, sy + Math.sin(time*4)*1.5*sc/3);
      uictx.fillStyle = "#ff8c1a";
      uictx.fillText("❗", sx, sy + Math.sin(time*4)*1.5*sc/3);
      uictx.textAlign = "left";
    }
  }
  if(!dialog){
    for(const v of VILLAGERS){
      const d = dist(player.x,player.y, v.x,v.y);
      if(d < 39){
        const [sx,sy] = W2S(v.x, v.y - v.h - 6);
        bubble(sx, sy, `${v.quest?"❗":""}${v.name}と はなす`, sc, true);
        break;
      }
    }
  }
  {
    const d = dist(player.x,player.y, STALL.tx*T+24, STALL.ty*T+30);
    if(d < 51 && !dialog){
      const [sx,sy] = W2S(STALL.tx*T+24, STALL.ty*T-27);
      bubble(sx, sy, "🫛 そらまめ商店", sc, true);
    }
  }
  const dogH = SPR.dog ? SPR.dog.side[0].h + 6 : 24;
  if(dog.sayT>0){
    const [sx,sy] = W2S(dog.x, dog.y-dogH);
    bubble(sx, sy, "わんっ♪", sc);
  }else if(!dialog && !fishing){
    const d = dist(player.x,player.y, dog.x,dog.y);
    if(d < 45 && !player.moving && player.idleT > 1.2 && ball.state==="none"){
      const [sx,sy] = W2S(dog.x, dog.y-dogH);
      bubble(sx, sy, "スペースで なでてね", sc, true);
    }
  }
  if(fishing && fishing.state==="bite"){
    const [sx,sy] = W2S(fishing.bx, fishing.by-15);
    const fs = 8*sc;
    uictx.font = `bold ${fs}px sans-serif`;
    uictx.fillStyle = "#ff3b5c";
    uictx.strokeStyle = "#fff"; uictx.lineWidth = 3*sc/3;
    uictx.textAlign = "center";
    uictx.strokeText("！", sx, sy);
    uictx.fillText("！", sx, sy);
    uictx.textAlign = "left";
  }

  /* ポケット */
  const fs = Math.max(11, 4.6*sc);
  uictx.font = `bold ${fs}px 'Hiragino Maru Gothic ProN', sans-serif`;
  const label = `🔔${bells}  🍎${pocket.apple}  🐟${sumInv(fishInv)}  🦋${sumInv(bugInv)}  🦴${pocket.fossil}  💗${petCount}`;
  const tw = uictx.measureText(label).width;
  roundRect(uictx, 4*sc, 4*sc, tw+6*sc, 8.4*sc, 4.2*sc, "rgba(255,255,255,0.85)");
  uictx.fillStyle = "#c05577";
  uictx.textBaseline = "middle";
  uictx.fillText(label, 7*sc, 8.4*sc);

  for(const f of floatTexts){
    const [sx,sy] = W2S(f.x, f.y);
    const ffs = Math.max(11, 4.6*sc);
    uictx.font = `bold ${ffs}px 'Hiragino Maru Gothic ProN', sans-serif`;
    uictx.globalAlpha = Math.min(1, f.t/0.4);
    uictx.strokeStyle = "#fff"; uictx.lineWidth = 3;
    uictx.textAlign = "center";
    uictx.strokeText(f.text, sx, sy);
    uictx.fillStyle = "#8a5f47";
    uictx.fillText(f.text, sx, sy);
    uictx.textAlign = "left";
    uictx.globalAlpha = 1;
  }

  if(popup){
    const pfs = Math.max(13, 5.8*sc);
    uictx.font = `bold ${pfs}px 'Hiragino Maru Gothic ProN', sans-serif`;
    const ptw = uictx.measureText(popup.text).width;
    const scale = Math.min(1, (2.6-popup.t)*7);
    const pw = Math.min(wpx*0.94, (ptw+14*sc))*scale, ph = 13*sc*scale;
    const px = wpx/2-pw/2, py = hpx*0.26-ph/2;
    roundRect(uictx, px, py, pw, ph, 6*sc*scale, "rgba(255,248,239,0.95)");
    uictx.strokeStyle = "#ffb0c8"; uictx.lineWidth = 2;
    uictx.stroke();
    if(scale > 0.9){
      uictx.fillStyle = "#7a4a2f";
      uictx.textAlign = "center"; uictx.textBaseline = "middle";
      uictx.fillText(popup.text, wpx/2, py+ph/2, pw*0.94);
      uictx.textAlign = "left";
    }
  }

  if(dialog){
    const dw = wpx*0.84, dh = Math.min(hpx*0.22, wpx*0.34);
    const dx0 = (wpx-dw)/2, dy0 = hpx - dh - hpx*0.04;
    roundRect(uictx, dx0, dy0, dw, dh, dh*0.28, "rgba(255,250,240,0.96)");
    uictx.strokeStyle = "#e8c9a3"; uictx.lineWidth = 3;
    uictx.stroke();
    const nfs = dh*0.26;
    uictx.font = `bold ${nfs}px 'Hiragino Maru Gothic ProN', sans-serif`;
    const nameLabel = dialog.v.name + (dialog.v.love>=1 ? " " + "♥".repeat(Math.min(5,Math.floor(dialog.v.love))) : "");
    const ntw = uictx.measureText(nameLabel).width;
    roundRect(uictx, dx0+dw*0.05, dy0-nfs*0.9, ntw+nfs*1.4, nfs*1.5, nfs*0.75, dialog.v.tag);
    uictx.fillStyle = "#fff";
    uictx.textBaseline = "middle";
    uictx.fillText(nameLabel, dx0+dw*0.05+nfs*0.7, dy0-nfs*0.9+nfs*0.78);
    const tfs = Math.min(dh*0.30, wpx*0.052);   /* 縦画面でも2行に収まるよう幅基準で上限 */
    uictx.font = `${tfs}px 'Hiragino Maru Gothic ProN', sans-serif`;
    uictx.fillStyle = "#5f4432";
    const shown = dialog.text.slice(0, Math.floor(dialog.chars));
    const maxW = dw*0.86;
    let line = "", ly = dy0 + dh*0.40;
    for(const ch of shown){
      if(uictx.measureText(line+ch).width > maxW){
        uictx.fillText(line, dx0+dw*0.07, ly);
        line = ch; ly += tfs*1.35;
      }else line += ch;
    }
    uictx.fillText(line, dx0+dw*0.07, ly);
    if(dialog.chars >= dialog.text.length && Math.floor(time*2.5)%2===0){
      uictx.fillStyle = "#e0648d";
      const mx = dx0+dw*0.94, my = dy0+dh*0.78;
      uictx.beginPath();
      uictx.moveTo(mx-tfs*0.3, my-tfs*0.25);
      uictx.lineTo(mx+tfs*0.3, my-tfs*0.25);
      uictx.lineTo(mx, my+tfs*0.2);
      uictx.closePath(); uictx.fill();
    }
  }
}
function bubble(sx, sy, text, sc, soft){
  const fs = Math.max(11, 4.6*sc);
  uictx.font = `bold ${fs}px 'Hiragino Maru Gothic ProN', sans-serif`;
  const tw = uictx.measureText(text).width;
  const bw = tw + 5*sc, bh = 8*sc;
  const bx = sx - bw/2, by = sy - bh;
  roundRect(uictx, bx, by, bw, bh, 3.5*sc, soft?"rgba(255,255,255,0.72)":"rgba(255,255,255,0.94)");
  uictx.beginPath();
  uictx.moveTo(sx-1.6*sc, by+bh-1);
  uictx.lineTo(sx, by+bh+2.4*sc);
  uictx.lineTo(sx+1.6*sc, by+bh-1);
  uictx.closePath();
  uictx.fillStyle = soft?"rgba(255,255,255,0.72)":"rgba(255,255,255,0.94)";
  uictx.fill();
  uictx.fillStyle = soft ? "#9b8a80" : "#6b4a38";
  uictx.textBaseline = "middle";
  uictx.fillText(text, bx+2.5*sc, by+bh/2+1);
}
function roundRect(g,x,y,w,h,r,fill){
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r);
  g.closePath(); g.fillStyle = fill; g.fill();
}

/* ================= メインループ ================= */
loadSave();
document.body.classList.toggle("hasball", hasBall);
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  update(dt);
  drawWorld();
  drawUI();
  requestAnimationFrame(loop);
}
applyViewport();
requestAnimationFrame(loop);

/* デバッグ用フック */
window.__G = { player, dog, VILLAGERS, trees, pocket, fishInv, bugInv, groundItems, SPR,
  digSpots, ball, bugs,
  act:()=>{ actPressed = true; },
  tryAction,
  step:(dt)=>update(dt),
  render:()=>{ drawWorld(); drawUI(); },
  get dialog(){ return dialog; },
  get fishing(){ return fishing; },
  get bells(){ return bells; },
  addBells:(n)=>{ bells += n; },
  setBall:(v)=>{ hasBall = v; },
  setDayT:(t)=>{ dayOffset = t - (time % DAY_LEN); },
  openShop, toggleBook };
</script>
